  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service worker registration with updated version -->
    <script src="/sw-register.js?v=3.0"></script>
    
    <!-- Enhanced resource error handling -->
    <script>
      // Enhanced error handling for resources
      window.addEventListener('error', function(e) {
        if (e.target && e.target.tagName) {
          const tag = e.target.tagName.toLowerCase();
          const src = e.target.src || e.target.href;
          
          if (tag === 'img' && src) {
            console.warn('Image failed to load:', src);
            e.target.src = '/placeholder.svg';
          } else if (tag === 'link' && src && src.includes('css')) {
            console.warn('CSS failed to load:', src);
          }
        }
      }, true);
      
      // Ensure favicon is loaded correctly on all domains
      (function() {
        const checkFavicon = () => {
          // Get all favicon links
          const faviconLinks = document.querySelectorAll('link[rel="icon"], link[rel="apple-touch-icon"], link[rel="manifest"]');
          const domain = window.location.hostname;
          
          // Add domain-specific cache parameter
          faviconLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href && (href.includes('favicon') || href.includes('apple-touch-icon') || href.includes('manifest'))) {
              // Generate domain-specific parameter
              const domainParam = domain.includes('poda') ? 'poda' : 'popri';
              const newHref = href.includes('?') 
                ? `${href}&domain=${domainParam}&t=${Date.now()}` 
                : `${href}?domain=${domainParam}&t=${Date.now()}`;
              link.setAttribute('href', newHref);
            }
          });
        };
        
        // Run after DOM is fully loaded
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', checkFavicon);
        } else {
          checkFavicon();
        }
      })();
    </script>
    
    <!-- NoScript fallback -->

        document.addEventListener('DOMContentLoaded', function() {

            .then(html => {
              document.getElementById('noscript-content').innerHTML = html;
            })
            .catch(() => {
              // Fallback content
              document.getElementById('noscript-content').innerHTML = '<p>Prosím povolte JavaScript pro plnou funkcionalitu stránky.</p>';
            });
        });
      </script>
