# Netlify build configuration
# Force Node + npm and generate SEO + AI static assets before build
[build]
  command = "npm ci && node scripts/build-seo.js || true && node scripts/generate-ai-pages.js || true && npm run build && node scripts/prerender-pages.js || true"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Edge Functions configuration for AI bot detection
[[edge_functions]]
  function = "ai-bot-detector"
  path = "/*"

# CRITICAL: Domain canonicalization - MUST be before all other redirects
[[redirects]]
  from = "https://popri.cz/*"
  to = "https://www.popri.cz/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://popri.cz/*"
  to = "https://www.popri.cz/:splat"
  status = 301
  force = true

# Global trailing slash normalization - redirect /path/ to /path
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301
  force = false

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml"

[[headers]]
  for = "/popri-favicon.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# SEO: Allow indexing for all HTML pages
[[headers]]
  for = "/"
  [headers.values]
    X-Robots-Tag = "index, follow"

[[headers]]
  for = "/*.html"
  [headers.values]
    X-Robots-Tag = "index, follow"
