# Netlify build configuration
# Force Node + npm and generate SEO + AI static assets before build
[build]
  command = "npm ci && node scripts/build-seo.js || true && node scripts/generate-ai-pages.js || true && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Edge Functions configuration for AI bot detection
[[edge_functions]]
  function = "ai-bot-detector"
  path = "/*"

# Global trailing slash normalization - redirect /path/ to /path
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301
  force = false

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml"
