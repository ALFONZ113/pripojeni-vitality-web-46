# Static file serving
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Enhanced headers for AI bots
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-AI-Friendly = "true"
    X-Content-Summary = "PODA internet provider with fiber optic services in Ostrava region"

[[headers]]
  for = "/prerender/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/html; charset=UTF-8"
    X-Robots-Tag = "index, follow"
    X-AI-Content = "prerendered"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml"

# New headers for static content optimization
[[headers]]
  for = "/prerender/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=7200"
    Content-Type = "text/html; charset=UTF-8"
    X-Robots-Tag = "index, follow"
    X-AI-Content = "prerendered"
    X-Content-Complete = "true"

[[headers]]
  for = "/"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    X-AI-Friendly = "true"
    X-Content-Summary = "PODA internet provider with fiber optic services in Ostrava region"
    Link = "</src/index.css>; rel=preload; as=style"
