
[build]
  command = "npm run build"
  publish = "dist"

# Edge Functions pre bot detection
[[edge_functions]]
  function = "bot-detector"
  path = "/*"

# Redirects pre SEO
[[redirects]]
  from = "https://pripojeni-poda.cz/*"
  to = "https://www.popri.cz/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://popri.cz/*"
  to = "https://www.popri.cz/:splat"
  status = 301
  force = true

# Headers pre SEO optimalizáciu
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Prerendering pre kritické stránky
[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.html]
  pretty_urls = true

# Performance optimalizácia
[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--production=false"
