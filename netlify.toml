[build]
  publish = "dist"
  command = "npm run build"
  
[build.environment]
  NODE_VERSION = "18"

# Edge Functions Configuration
[[edge_functions]]
  function = "bot-detector"
  path = "/*"

# Enhanced prerender rules for ALL bots and search engines
[[redirects]]
  from = "/"
  to = "/prerender/index.html"
  status = 200
  conditions = { User-Agent = ["*bot*", "*crawler*", "*spider*", "*scraper*", "*Gemini*", "*GPT*", "*Claude*", "*ChatGPT*", "*anthropic*", "*OpenAI*", "*Google*", "*Bing*", "*Yahoo*", "*Baidu*", "*DuckDuckGo*", "*Yandex*", "*Seznam*", "*Facebook*", "*Twitter*", "*LinkedIn*", "*WhatsApp*", "*Telegram*", "*Slack*", "*Discord*", "*CCBot*", "*GPTBot*", "*Google-Extended*", "*gemini-pro*", "*palm*", "*bard*", "*llama*", "*meta-ai*", "*perplexity*", "*you.com*", "*phind*", "*cohere*", "*AI*", "*artificial*", "*intelligence*", "*machine*", "*learning*", "*neural*", "*deep*", "*language*", "*model*", "*assistant*", "*chat*", "*conversational*", "*gpt*", "*bert*", "*transformer*", "*llm*", "*nlp*", "*ml*", "*dl*", "*python-requests*", "*curl*", "*wget*", "*http*", "*api*", "*scraper*", "*parser*", "*extractor*", "*indexer*", "*Mobile*", "*Smartphone*"] }

