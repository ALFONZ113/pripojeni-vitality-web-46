# Netlify build configuration
# Force Node + npm and generate SEO + AI static assets before build
[build]
  command = "npm ci && node scripts/build-seo.js || true && node scripts/generate-ai-pages.js || true && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# CRITICAL: Edge function for social crawlers (Facebook, Twitter, LinkedIn)
# Must intercept requests BEFORE SPA routing - explicit priority
[[edge_functions]]
  function = "ai-bot-detector"
  path = "/blog/*"
  cache = "manual"

[[edge_functions]]
  function = "ai-bot-detector"
  path = "/*"
  cache = "manual"

# CRITICAL: SPA fallback for blog - AFTER edge function processes crawlers
[[redirects]]
  from = "/blog/*"
  to = "/index.html"
  status = 200
  force = false

# CRITICAL: Domain canonicalization - MUST be before all other redirects
[[redirects]]
  from = "https://popri.cz/*"
  to = "https://www.popri.cz/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://popri.cz/*"
  to = "https://www.popri.cz/:splat"
  status = 301
  force = true

# Global trailing slash normalization - redirect /path/ to /path
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301
  force = false

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml"

# Force fresh content for blog images (social media)
[[headers]]
  for = "/blog-images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Access-Control-Allow-Origin = "*"
