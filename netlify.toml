
[build]
  publish = "dist"
  command = "npm run build"
  
[build.environment]
  NODE_VERSION = "18"

# Prerender rules for AI bots and search engines
[[redirects]]
  from = "/"
  to = "/prerender/index.html"
  status = 200
  conditions = { User-Agent = ["*bot*", "*crawler*", "*spider*", "*scraper*", "*Gemini*", "*GPT*", "*Claude*"] }

[[redirects]]
  from = "/blog"
  to = "/prerender/blog.html" 
  status = 200
  conditions = { User-Agent = ["*bot*", "*crawler*", "*spider*", "*scraper*", "*Gemini*", "*GPT*", "*Claude*"] }

# Static file serving
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Enhanced headers for AI bots
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-AI-Friendly = "true"
    X-Content-Summary = "PODA internet provider with fiber optic services in Ostrava region"

[[headers]]
  for = "/prerender/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/html; charset=UTF-8"
    X-Robots-Tag = "index, follow"
    X-AI-Content = "prerendered"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml"
