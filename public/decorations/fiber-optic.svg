<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fiber optic cables illustration -->
  <defs>
    <linearGradient id="fiberGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(24, 95%, 53%);stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:hsl(24, 95%, 53%);stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="fiberGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(217, 91%, 60%);stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:hsl(217, 91%, 60%);stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Main fiber cables -->
  <path d="M 50 50 Q 100 150 80 250 T 100 350" stroke="url(#fiberGradient1)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 80 30 Q 130 120 110 220 T 130 330" stroke="url(#fiberGradient2)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 110 70 Q 160 170 140 270 T 160 370" stroke="url(#fiberGradient1)" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Light particles -->
  <circle cx="70" cy="100" r="4" fill="hsl(24, 95%, 53%)" opacity="0.9">
    <animate attributeName="cy" from="100" to="350" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.9" to="0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="115" cy="80" r="3" fill="hsl(217, 91%, 60%)" opacity="0.8">
    <animate attributeName="cy" from="80" to="330" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.8" to="0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="120" r="3.5" fill="hsl(24, 95%, 53%)" opacity="0.7">
    <animate attributeName="cy" from="120" to="370" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.7" to="0" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Connection nodes -->
  <circle cx="80" cy="250" r="8" fill="hsl(24, 95%, 53%)" opacity="0.6"/>
  <circle cx="110" cy="220" r="6" fill="hsl(217, 91%, 60%)" opacity="0.5"/>
  <circle cx="140" cy="270" r="7" fill="hsl(24, 95%, 53%)" opacity="0.4"/>
</svg>