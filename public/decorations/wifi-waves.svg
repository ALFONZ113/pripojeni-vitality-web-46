<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- WiFi waves illustration -->
  <defs>
    <linearGradient id="wifiGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(217, 91%, 60%);stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:hsl(217, 91%, 60%);stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Central router/antenna -->
  <rect x="130" y="180" width="40" height="60" rx="4" fill="hsl(217, 91%, 60%)" opacity="0.6"/>
  <circle cx="150" cy="170" r="8" fill="hsl(24, 95%, 53%)" opacity="0.9"/>
  
  <!-- WiFi waves - expanding circles -->
  <circle cx="150" cy="200" r="30" stroke="url(#wifiGradient)" stroke-width="3" fill="none" opacity="0.8">
    <animate attributeName="r" from="30" to="120" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.8" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="200" r="30" stroke="url(#wifiGradient)" stroke-width="3" fill="none" opacity="0.8">
    <animate attributeName="r" from="30" to="120" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.8" to="0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="200" r="30" stroke="url(#wifiGradient)" stroke-width="3" fill="none" opacity="0.8">
    <animate attributeName="r" from="30" to="120" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.8" to="0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Signal arcs -->
  <path d="M 110 180 Q 90 200 110 220" stroke="hsl(24, 95%, 53%)" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 190 180 Q 210 200 190 220" stroke="hsl(24, 95%, 53%)" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Data packets -->
  <rect x="100" y="150" width="12" height="12" rx="2" fill="hsl(24, 95%, 53%)" opacity="0.8">
    <animate attributeName="y" from="150" to="100" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.8" to="0" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="188" y="160" width="12" height="12" rx="2" fill="hsl(217, 91%, 60%)" opacity="0.7">
    <animate attributeName="y" from="160" to="110" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.7" to="0" dur="1.8s" repeatCount="indefinite"/>
  </rect>
</svg>