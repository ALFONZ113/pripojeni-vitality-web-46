      /* Kritické CSS pro zabránění skoků v layoutu */
      body { opacity: 0; transition: opacity 0.2s ease-in; }

    <!-- Script to handle loading optimization -->
    <script>
      // Přidá třídu 'loaded' po načtení DOM
      document.addEventListener('DOMContentLoaded', function() {
        document.body.classList.add('loaded');
        document.documentElement.classList.add('fonts-loaded');
        
        // Agresivní odstranění cache
        function generateCacheBuster() {
          return 'v' + Date.now() + Math.random().toString(36).substring(2);
        }
        
        // Přidání parametrů verze ke všem CSS a JS souborům
        const cacheBuster = generateCacheBuster();
        
        document.querySelectorAll('link[rel="stylesheet"]').forEach(function(link) {
          const href = link.getAttribute('href');
          if (href && !href.includes('v=202504')) {
            link.setAttribute('href', href + (href.includes('?') ? '&' : '?') + 'v=' + cacheBuster);
          }
        });
        
        document.querySelectorAll('script[src]').forEach(function(script) {
          const src = script.getAttribute('src');
          if (src && !src.includes('v=202504')) {
            script.setAttribute('src', src + (src.includes('?') ? '&' : '?') + 'v=' + cacheBuster);
          }
        });
        
        // Force hard refresh after 15 minutes
        const lastRefresh = localStorage.getItem('last-refresh-time');
        const now = Date.now();
        localStorage.setItem('last-refresh-time', now);
        
        if (lastRefresh && (now - parseInt(lastRefresh)) > 15 * 60 * 1000) {
          window.location.reload();
        }
      });
    </script>
    
    <!-- Required Lovable script tag for "Select" feature -->
