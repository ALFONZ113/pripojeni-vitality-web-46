<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Speed meter / performance gauge illustration -->
  <defs>
    <linearGradient id="speedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:hsl(24, 95%, 53%);stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:hsl(24, 95%, 53%);stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:hsl(217, 91%, 60%);stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Gauge background -->
  <circle cx="150" cy="200" r="80" stroke="hsl(217, 91%, 60%)" stroke-width="12" fill="none" opacity="0.2" stroke-dasharray="251.2 251.2" stroke-dashoffset="62.8"/>
  
  <!-- Gauge progress -->
  <circle cx="150" cy="200" r="80" stroke="url(#speedGradient)" stroke-width="12" fill="none" opacity="0.8" stroke-dasharray="188.4 251.2" stroke-dashoffset="62.8" stroke-linecap="round">
    <animate attributeName="stroke-dasharray" from="0 251.2" to="188.4 251.2" dur="2s" fill="freeze"/>
  </circle>
  
  <!-- Center hub -->
  <circle cx="150" cy="200" r="15" fill="hsl(24, 95%, 53%)" opacity="0.9"/>
  
  <!-- Needle -->
  <line x1="150" y1="200" x2="210" y2="160" stroke="hsl(24, 95%, 53%)" stroke-width="4" stroke-linecap="round" opacity="0.9">
    <animateTransform attributeName="transform" type="rotate" from="0 150 200" to="135 150 200" dur="2s" fill="freeze"/>
  </line>
  
  <!-- Speed markings -->
  <text x="100" y="270" fill="hsl(217, 91%, 60%)" font-size="14" font-weight="600" opacity="0.7">0</text>
  <text x="185" y="270" fill="hsl(24, 95%, 53%)" font-size="14" font-weight="600" opacity="0.9">1000</text>
  <text x="130" y="290" fill="hsl(217, 91%, 60%)" font-size="12" opacity="0.6">Mbps</text>
  
  <!-- Speed lines -->
  <path d="M 80 150 L 90 155" stroke="hsl(217, 91%, 60%)" stroke-width="2" opacity="0.5"/>
  <path d="M 75 180 L 85 180" stroke="hsl(217, 91%, 60%)" stroke-width="2" opacity="0.5"/>
  <path d="M 80 210 L 90 205" stroke="hsl(217, 91%, 60%)" stroke-width="2" opacity="0.5"/>
  <path d="M 220 150 L 210 155" stroke="hsl(24, 95%, 53%)" stroke-width="2" opacity="0.7"/>
  <path d="M 225 180 L 215 180" stroke="hsl(24, 95%, 53%)" stroke-width="2" opacity="0.7"/>
  <path d="M 220 210 L 210 205" stroke="hsl(24, 95%, 53%)" stroke-width="2" opacity="0.7"/>
  
  <!-- Glow effect -->
  <circle cx="150" cy="200" r="90" fill="none" stroke="hsl(24, 95%, 53%)" stroke-width="1" opacity="0.3">
    <animate attributeName="r" from="90" to="100" dur="2s" repeatCount="indefinite" direction="alternate"/>
    <animate attributeName="opacity" from="0.3" to="0.1" dur="2s" repeatCount="indefinite" direction="alternate"/>
  </circle>
</svg>